# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"        

ai_usage_summary: |
  Used Gemini to architect the memory-safe data streaming pipeline, write the semantic vector ranking logic, debug Windows path execution, and build the Streamlit frontend. No candidate data was fed to the LLM.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Hybrid semantic and rule-based pipeline. Stage 1 (The Bouncer) uses memory-safe JSONL generators to instantly drop honeypots, ghost candidates (<10% response rate), and severe role mismatches. Stage 2 (Semantic Engine) uses local all-MiniLM-L6-v2 embeddings and NumPy matrix operations to calculate cosine similarity against the JD. Stage 3 applies behavioral multipliers based on Redrob signals (GitHub activity boosts). Actively maintains a Min-Heap for highly efficient Top-100 sorting within the 5-minute CPU limit.

